name: Build Windows app

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - "x_scraper.py"
      - "x_downoland.spec"
      - "pyproject.toml"
      - ".github/workflows/build-windows.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps + PyInstaller
        shell: bash
        run: |
          python -m pip install --upgrade pip wheel
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        shell: bash
        run: pyinstaller --noconfirm x_downoland.spec

      - name: Show build size
        shell: bash
        run: du -sh dist/X-downoland || true

      - name: Package as ZIP
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path X-downoland -DestinationPath X-downoland-windows.zip -CompressionLevel Optimal
          Get-ChildItem X-downoland-windows.zip

      - name: Publish to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "build-${{ github.run_number }}" \
            dist/X-downoland-windows.zip \
            --title "Windows build ${{ github.run_number }}" \
            --notes "Standalone Windows build of **X-downoland**.

          **Jak użyć:**
          1. Pobierz \`X-downoland-windows.zip\` poniżej.
          2. Rozpakuj.
          3. Wejdź do folderu \`X-downoland\` i odpal \`X-downoland.exe\`.
          4. Kliknij **Zaloguj (import z przeglądarki)** — automatyczny import cookies z Chrome / Firefox / Edge.
          5. Wpisz nazwę profilu (bez @), wybierz folder, **Start**.

          Bez logowania działa, ale X zwraca tylko ostatnie ~30 mediów."
